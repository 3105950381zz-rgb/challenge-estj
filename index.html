<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>挽回 ESTJ 挑战</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1212;color:#f0ece4;min-height:100vh;overflow-x:hidden}

/* Animated bg */
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 30% 20%,rgba(13,148,136,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(13,148,136,.04),transparent 50%),#0a1212}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;background:rgba(13,148,136,.2);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Screen shake */
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
.shake{animation:shake .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .4s ease}

/* ===== HEADER ===== */
.hd{text-align:center;padding:32px 20px 20px;position:relative}
.hd-badge{display:inline-block;padding:3px 12px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(13,148,136,.1);color:#0d9488;letter-spacing:1px;margin-bottom:10px;border:1px solid rgba(13,148,136,.15)}
.hd h1{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f0ece4,#0d9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:12px;color:rgba(240,236,228,.3);margin-top:6px}

.ct{max-width:480px;margin:0 auto;padding:0 14px 30px}

/* ===== HOME ===== */
.home{text-align:center;padding:20px 0}
.home-icon{font-size:72px;margin-bottom:12px;display:block}
.home-sub{font-size:13px;color:rgba(240,236,228,.4);margin-bottom:4px;letter-spacing:1px}
.home-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#f0ece4}
.home-desc{font-size:12px;color:rgba(240,236,228,.3);line-height:1.7;margin:8px 0 20px;padding:0 10px}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.home-stats span{padding:4px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);font-size:11px;color:rgba(240,236,228,.4)}

/* ===== BUTTON ===== */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;box-shadow:0 4px 20px rgba(13,148,136,.2)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(13,148,136,.3)}
.btn-second{background:rgba(255,255,255,.03);color:rgba(240,236,228,.4);border:1px solid rgba(255,255,255,.06)}
.btn-danger{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}

/* ===== CARD ===== */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#0d9488,transparent);opacity:.5}

/* LEVEL HEADER */
.lv-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lv-name{font-size:11px;font-weight:600;color:#0d9488;letter-spacing:1px}
.lv-progress{font-size:10px;color:rgba(240,236,228,.3)}

.lv-scene{font-size:13px;color:rgba(240,236,228,.5);line-height:1.7;margin-bottom:12px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border-left:2px solid rgba(13,148,136,.3)}
.lv-line{font-size:15px;font-weight:600;color:#f0ece4;margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.04)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{width:100%;padding:13px 14px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.02);font-size:13px;color:#f0ece4;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.4}
.opt:hover{border-color:rgba(13,148,136,.2);background:rgba(13,148,136,.04)}
.opt:active{transform:scale(.97)}
.opt .il{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;font-size:10px;font-weight:700;margin-right:10px;color:#fff}
.opt .s1{background:#0d9488}.opt .s2{background:#0f766e}.opt .s3{background:#115e59}.opt .s4{background:#14b8a6}
.opt.wrong{animation:shake .5s;border-color:#e94560;background:rgba(233,69,96,.08)!important}
.opt.right{border-color:#4caf50;background:rgba(76,175,80,.08)!important}

/* ===== GAME OVER ===== */
.go-screen{text-align:center;padding:30px 0;max-width:400px;margin:0 auto}
.go-icon{font-size:72px;margin-bottom:10px;display:block}
.go-title{font-size:24px;font-weight:800;color:#e94560;margin-bottom:4px}
.go-sub{font-size:12px;color:rgba(240,236,228,.3);margin-bottom:16px}
.go-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(233,69,96,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #e94560}
.go-qr{margin:16px auto;width:180px;height:180px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.06)}
.go-qr img{width:100%;height:100%;object-fit:cover;display:block}
.go-brand{font-size:11px;color:rgba(240,236,228,.2);margin-bottom:20px;letter-spacing:1px}

/* ===== WIN ===== */
.win-screen{text-align:center;padding:20px 0}
.win-icon{font-size:72px;margin-bottom:10px;display:block}
.win-title{font-size:24px;font-weight:800;color:#0d9488;margin-bottom:4px}
.win-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(13,148,136,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #0d9488}
.win-qr{margin:16px auto;width:180px;height:180px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.06)}
.win-qr img{width:100%;height:100%;object-fit:cover;display:block}
.win-brand{font-size:11px;color:rgba(240,236,228,.2);margin-bottom:16px;letter-spacing:1px}

/* BRAND */
.brand{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-top:12px}
.brand img{width:72px;height:72px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(255,255,255,.06)}
.brand .bn{font-size:14px;font-weight:700;color:#f0ece4;letter-spacing:2px}
.brand .bs{font-size:10px;color:rgba(240,236,228,.25);margin-top:3px;line-height:1.5}
.ft{font-size:9px;color:rgba(240,236,228,.15);text-align:center;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="hd">
  <div class="hd-badge">✦ 挽回挑战</div>
  <h1>挽回 ESTJ</h1>
  <p>只有一次机会，选错就输了</p>
</div>

<div class="ct" id="app"></div>

<script>
// Particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}
})();

const DATA={
  emoji:'📊',title:'ESTJ',subtitle:'高效有序的管理者',
  desc:'ESTJ 要的是秩序和责任。你一次次的不靠谱、没有责任心、逃避问题，在TA眼里不是性格差异，是你不合格。',
  color:'#0d9488',qrSrc:'qrcode.jpg',
  winDesc:'你证明了你有担当、有执行力。ESTJ看到了你的改变和责任心。你通过了TA的"标准考核"——不是因为完美，是因为你认真对待了。'
};

const OPTIONS=[
  '拿出实际行动证明你的责任',
  '给TA一个清晰的改善计划',
  '找理由为自己开脱辩解',
  '主动承担更多责任'
];

const STAGES=[
  {scene:'你说到没做到',line:'结果呢？',safe:1,death:'你说在努力 TA要看结果不是过程'},
  {scene:'你逃避了一个问题',line:'你打算怎么处理？',safe:4,death:'你躲 TA自己解决了 包括解决你'},
  {scene:'TA说你没有上进心',line:'你打算就这样？',safe:2,death:'你说这样挺好 TA说我们不合适'},
  {scene:'你在公共场合让TA丢面子',line:'你注意点。',safe:1,death:'你觉得没事 TA觉得很有事'},
  {scene:'TA安排的任务你没完成',line:'没做完？',safe:2,death:'你找借口 TA觉得你没有职业素养'},
  {scene:'你让TA失望了不止一次',line:'你又这样。',safe:1,death:'你说最后一次 TA数着这是第几次'},
  {scene:'TA说你不够成熟',line:'你觉得这样对吗？',safe:2,death:'你觉得没什么 TA不想跟你辩论'},
  {scene:'TA不再给你安排任何事情了',line:'我自己来。',safe:4,death:'不安排你了 因为你不在TA的团队里了'},
  {scene:'TA批评你你不服气',line:'你觉得你对了？',safe:1,death:'你吵 TA不跟没有结果的人吵'},
  {scene:'TA说你影响TA的进度',line:'你拖后腿了。',safe:2,death:'你不改 TA优化了流程 包括优化你'},
  {scene:'TA用绩效衡量你们的感情',line:'你最近的表现在下降。',safe:4,death:'你说感情不是绩效 TA说要考核的'},
  {scene:'TA给你下了最后通牒',line:'这是最后一次。',safe:1,death:'你没达到标准 被淘汰了'}
];

let cur=0,over=false;
const A=document.getElementById('app');
const LABELS=['A','B','C','D'];

function hm(){
  A.innerHTML=`<div class="home">
    <span class="home-icon">${DATA.emoji}</span>
    <div class="home-sub">挽回挑战 · 只有一次机会</div>
    <div class="home-title">挽回 ${DATA.title}</div>
    <div class="home-desc">${DATA.desc}</div>
    <div class="home-stats">
      <span>💀 选错即输</span>
      <span>🏆 共${STAGES.length}关</span>
    </div>
    <button class="btn btn-primary" onclick="go()">▶ 开始挑战</button>
    <div class="brand" style="margin-top:20px">
      <img src="${DATA.qrSrc}" alt="qr"/>
      <div>
        <div class="bn">灵客星球</div>
        <div class="bs">灵客星球 · 让AI为你所用</div>
      </div>
    </div>
  </div>`;
}

function go(){
  cur=0;over=false;A.innerHTML='<div class="fi">'+lv()+'</div>';
}

function lv(){
  if(over)return'';
  if(cur>=STAGES.length)return end();
  const s=STAGES[cur];
  const optsHtml=OPTIONS.map((o,i)=>`<button class="opt" onclick="pk(${i})"><span class="il s${i+1}">${LABELS[i]}</span>${o}</button>`).join('');
  return `<div class="card fi">
    <div class="lv-hd">
      <span class="lv-name">⚠️ 第${cur+1}/${STAGES.length}关</span>
      <span class="lv-progress">💀 选错就输</span>
    </div>
    <div class="lv-scene">${s.scene}</div>
    <div class="lv-line">"${s.line}"</div>
    <div class="opts">${optsHtml}</div>
  </div>`;
}

function pk(i){
  if(over)return;
  const s=STAGES[cur];
  const isCorrect=(i+1)===s.safe;
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.style.pointerEvents='none');

  if(isCorrect){
    btns[i].classList.add('right');
    setTimeout(()=>{cur++;A.innerHTML='<div class="fi">'+lv()+'</div>';},500);
  } else {
    btns[i].classList.add('wrong');
    document.body.classList.add('shake');
    over=true;
    setTimeout(()=>{A.innerHTML=end()},700);
  }
}

function end(){
  if(over){
    const s=STAGES[Math.min(cur,STAGES.length-1)];
    return `<div class="go-screen fi">
      <span class="go-icon">💀</span>
      <div class="go-title">挽回失败</div>
      <div class="go-sub">你在第${Math.min(cur+1,STAGES.length)}关说错了话</div>
      <div class="go-desc">${s.death}</div>
      <div class="go-qr"><img src="${DATA.qrSrc}" alt="扫码聊"/></div>
      <div class="go-brand">灵客星球</div>
      <button class="btn btn-danger" onclick="go()">🔄 再试一次</button>
    </div>`;
  }
  return `<div class="win-screen fi">
    <span class="win-icon">🎉</span>
    <div class="win-title">恭喜通关！</div>
    <div style="font-size:12px;color:rgba(240,236,228,.3);margin:4px 0 14px">你成功挽回了${DATA.title}的心</div>
    <div class="win-desc">${DATA.winDesc}</div>
    <div class="win-qr"><img src="${DATA.qrSrc}" alt="扫码聊"/></div>
    <div class="win-brand">灵客星球</div>
    <button class="btn btn-primary" onclick="cap()">📸 保存战绩</button>
    <div style="height:8px"></div>
    <button class="btn btn-second" onclick="go()">🔄 再测一次</button>
  </div>`;
}

function cap(){
  if(typeof html2canvas==='undefined'){alert('请截图保存');return}
  const el=document.querySelector('.win-screen');
  if(!el)return;
  html2canvas(el,{backgroundColor:'#0a1212',scale:2,useCORS:true,logging:false}).then(function(c){
    c.toBlob(function(b){const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='拯回'+DATA.title+'-通关.png';a.click()});
  }).catch(function(){alert('截图失败请手动截图')});
}

hm();
</script>
</body>
</html>
